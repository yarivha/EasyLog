###############################################################################
# apache-access.conf — forward Apache access logs to EasyLog via rsyslog
#
# Install on the APACHE / web server (NOT the EasyLog server):
#   sudo cp apache-access.conf /etc/rsyslog.d/60-easylog.conf
#   # edit EASYLOG_IP and the File= path below, then:
#   sudo rsyslogd -N1 && sudo systemctl restart rsyslog
#
# Then, on the EasyLog server, register THIS host's IP as an "apache" source at
#   http://<easylog-host>:3000/sources
# (EasyLog routes incoming logs to a parser by source IP.)
###############################################################################

module(load="imfile")

# Tail the Apache access log. Each new line becomes one syslog message and is
# handed only to the easylog_forward ruleset below (so these lines are NOT also
# written to the host's local /var/log/syslog).
#   Debian/Ubuntu: /var/log/apache2/access.log
#   RHEL/CentOS:   /var/log/httpd/access_log
input(type="imfile"
      File="/var/log/apache2/access.log"
      Tag="apache"
      ruleset="easylog_forward")

# Multiple vhosts with separate access logs? Add one input() per file, all
# pointing at the same ruleset:
# input(type="imfile" File="/var/log/apache2/other-vhost_access.log"
#       Tag="apache" ruleset="easylog_forward")

ruleset(name="easylog_forward") {
    action(type="omfwd"
           target="EASYLOG_IP"          # <-- EasyLog server IP or hostname
           port="514"
           protocol="udp"               # "udp" (fire-and-forget) or "tcp" (reliable)
           template="RSYSLOG_ForwardFormat"

           # For protocol="tcp", uncomment to queue + retry so access lines
           # survive a brief EasyLog restart instead of being dropped:
           # action.resumeRetryCount="-1"
           # queue.type="linkedList"
           # queue.saveOnShutdown="on"
           )
}
