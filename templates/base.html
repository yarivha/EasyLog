<!DOCTYPE html>
{# base.html — shared Bootstrap layout: navbar + content block. Dark theme. #}
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EasyLog{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="/static/bootstrap-icons.css">
  <style>
    body { min-height:100vh; }
    .navbar-brand { font-weight:700; letter-spacing:.2px; }
    .brand-mark { color:var(--bs-primary); }
    main { max-width:1040px; }
    .stat-value { font-size:1.9rem; font-weight:700; line-height:1.1; }
    .stat-label { color:var(--bs-secondary-color); font-size:.78rem;
                  text-transform:uppercase; letter-spacing:.05em; }
    .section-title { font-size:.8rem; text-transform:uppercase; letter-spacing:.05em;
                     color:var(--bs-secondary-color); font-weight:600; }
    /* Vertical bar timeline (Bootstrap has no vertical bar chart). */
    .timeline { display:flex; align-items:flex-end; gap:5px; height:170px; }
    .timeline .col-bar { flex:1; display:flex; flex-direction:column; align-items:center;
                         justify-content:flex-end; height:100%; }
    .timeline .bar { width:72%; min-height:3px; border-radius:4px 4px 0 0; }
    .timeline .tl-label { font-size:.7rem; color:var(--bs-secondary-color); margin-top:6px;
                          white-space:nowrap; }
    .truncate { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:0; }
    td .progress { min-width:80px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-md border-bottom mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="bi bi-stack brand-mark me-1"></i>Easy<span class="brand-mark">Log</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#nav" aria-controls="nav" aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {% if active == 'home' %}active{% endif %}" href="/">
              <i class="bi bi-house-door me-1"></i>Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active == 'apache' %}active{% endif %}" href="/apache">
              <i class="bi bi-bar-chart me-1"></i>Apache</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active == 'sources' %}active{% endif %}" href="/sources">
              <i class="bi bi-hdd-network me-1"></i>Sources</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container pb-5">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/bootstrap.bundle.min.js"></script>
</body>
</html>
